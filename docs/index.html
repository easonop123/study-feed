<!doctype html>
<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Study Feed</title>
  <meta name="description" content="Turns dead time into revision." />

  <!-- installs to the home screen as a proper full-screen app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-title" content="Study Feed" />
  <meta name="theme-color" content="#F6F7FB" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body { margin: 0; background: #F6F7FB; -webkit-font-smoothing: antialiased; }
